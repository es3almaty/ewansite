<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">ARC — AI Readiness and Capability</title>
  <desc id="desc">ARC wordmark with the subtitle AI Readiness and Capability.</desc>

  <defs>
    <linearGradient id="arcGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1f1f"/>
      <stop offset="58%" stop-color="#4f1717"/>
      <stop offset="100%" stop-color="#1f3146"/>
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#24211f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="34" fill="#fafaf8"/>

  <g filter="url(#softShadow)">
    <rect x="42" y="42" width="876" height="216" rx="32" fill="#ffffff" stroke="#ded6ca" stroke-width="2"/>
  </g>

  <g transform="translate(86 78)">
    <path d="M0 112 C92 8, 206 8, 298 112" fill="none" stroke="#b08a3c" stroke-width="10" stroke-linecap="round"/>
    <path d="M42 114 C116 42, 182 42, 256 114" fill="none" stroke="#ded6ca" stroke-width="5" stroke-linecap="round"/>

    <text x="0" y="110"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="104"
      font-weight="700"
      letter-spacing="-5"
      fill="url(#arcGradient)">ARC</text>

    <line x1="324" y1="35" x2="324" y2="125" stroke="#ded6ca" stroke-width="2"/>

    <text x="360" y="72"
      font-family="Inter, Arial, sans-serif"
      font-size="30"
      font-weight="800"
      letter-spacing="5"
      fill="#6b1f1f">AI READINESS</text>

    <text x="360" y="113"
      font-family="Inter, Arial, sans-serif"
      font-size="30"
      font-weight="800"
      letter-spacing="5"
      fill="#1f3146">&amp; CAPABILITY</text>

    <text x="2" y="165"
      font-family="Inter, Arial, sans-serif"
      font-size="16"
      font-weight="600"
      letter-spacing="2.5"
      fill="#6a625c">ADVISORY PRACTICE FOR GOVERNED AI ADOPTION</text>
  </g>
</svg>
